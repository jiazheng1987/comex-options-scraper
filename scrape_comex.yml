name: Scrape COMEX Options

# 美东 17:00 = UTC 21:00（EDT, 夏令时）或 UTC 22:00（EST, 标准时）
# GitHub cron 仅支持 UTC，因此注册两个触发点，并在 job 内校验当前是否为美东 17 点
on:
  schedule:
    - cron: "0 21 * * *"
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape-comex
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Check if 5 PM Eastern (skip duplicate UTC trigger)
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Manual run — skipping time gate"
            exit 0
          fi
          hour=$(TZ='America/New_York' date +%H)
          if [ "$hour" = "17" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Current Eastern hour is 17 — proceeding"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Current Eastern hour is $hour — skipping"
          fi

      - name: Checkout repository
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: pip install -r requirements.txt

      - name: Run COMEX options scraper
        if: steps.gate.outputs.run == 'true'
        run: python fetch_comex_options.py --once

      - name: Commit and push updated CSV
        if: steps.gate.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add comex_options_data.csv
          if git diff --staged --quiet; then
            echo "No changes to comex_options_data.csv"
          else
            git commit -m "chore: update comex_options_data.csv [automated]"
            git push
          fi
